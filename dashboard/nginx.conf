server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Proxy API calls to the dashboard-api service (docker-compose network).
  location /api/ {
    proxy_pass http://dashboard-api:8090;
    proxy_set_header Host $host;
  }

  # SPA fallback: client-side routes resolve to index.html.
  location / {
    try_files $uri /index.html;
  }
}
