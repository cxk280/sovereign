# Local ($0) stack for sovereign. Grows one service per build-order step.
# Step 0 ships the vector store (Qdrant) so RAG/MCP have a target in Step 2.
# Step 1 adds `gateway`; Step 1/2 add a local model backend (Ollama or llama.cpp).
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - qdrant

  # Read-only backend for the operator dashboard (build-order Step 5).
  dashboard-api:
    build:
      context: .
      dockerfile: dashboard_api/Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      - gateway

  # Operator dashboard SPA — nginx serves the static bundle and proxies /api
  # to dashboard-api. Open http://localhost:5173.
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - dashboard-api

  # Local model backend — the $0 dev path. Pull a model once with:
  #   docker compose exec ollama ollama pull qwen2.5-coder:1.5b
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama
