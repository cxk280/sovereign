# Thin public CI on GitHub. The full AI-assisted pipeline (code review, test
# generation, MR summarization) runs on the GitLab mirror — see .gitlab-ci.yml.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev + gateway + eval extras)
        run: uv sync --extra dev --extra gateway --extra eval
      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy
        run: uv run mypy sovereign gateway rag mcp_servers eval ci ide adoption
      - name: Pytest
        run: uv run pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
