apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-qdrant
  labels: { app: sovereign-qdrant }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sovereign-qdrant }
  template:
    metadata:
      labels: { app: sovereign-qdrant }
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          ports:
            - containerPort: {{ .Values.qdrant.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-qdrant
spec:
  selector: { app: sovereign-qdrant }
  ports:
    - port: {{ .Values.qdrant.port }}
      targetPort: {{ .Values.qdrant.port }}
