{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm
  labels: { app: sovereign-vllm }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sovereign-vllm }
  template:
    metadata:
      labels: { app: sovereign-vllm }
    spec:
      containers:
        - name: vllm
          image: {{ .Values.vllm.image }}
          args:
            - "--model"
            - "{{ .Values.vllm.model }}"
            - "--tensor-parallel-size"
            - "{{ .Values.vllm.gpus }}"
          ports:
            - containerPort: {{ .Values.vllm.port }}
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.vllm.gpus }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm
spec:
  selector: { app: sovereign-vllm }
  ports:
    - port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
{{- end }}
